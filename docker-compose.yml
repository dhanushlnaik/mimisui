version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    env_file:
      - ./apps/bot/.env
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - ./apps/web/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
